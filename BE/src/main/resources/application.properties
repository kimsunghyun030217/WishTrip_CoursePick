spring.application.name=coursepick

spring.datasource.url=jdbc:mysql://localhost:3306/course_pick?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

#DB변경안함
spring.jpa.hibernate.ddl-auto=update  

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true



# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Tour API
tour.api.base-url=https://apis.data.go.kr/B551011/KorService2
tour.api.service-key=${KTO_KOR_SERVICE_API_KEY}